# ============================================================
# JetAcker Ackermann Navigation2 parameters
# ROS2 Humble
# ============================================================

amcl:
  ros__parameters:
    use_sim_time: true

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map

    scan_topic: scan
    robot_model_type: nav2_amcl::DifferentialMotionModel

    min_particles: 500
    max_particles: 2000
    max_beams: 60

    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1

    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_min_range: 0.05
    laser_max_range: 12.0

    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5

    sigma_hit: 0.2
    lambda_short: 0.1

    pf_err: 0.05
    pf_z: 0.99

    transform_tolerance: 0.5
    tf_broadcast: false
    save_pose_rate: 0.5


map_server:
  ros__parameters:
    use_sim_time: true

    # navigation launch에서 실제 map YAML 경로를 전달합니다.
    yaml_filename: ""


map_saver:
  ros__parameters:
    use_sim_time: true

    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true


# ============================================================
# Controller Server
# Regulated Pure Pursuit for Ackermann path tracking
# ============================================================

controller_server:
  ros__parameters:
    use_sim_time: true

    controller_frequency: 20.0
    odom_topic: /odom

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5

    progress_checker_plugin: progress_checker

    goal_checker_plugins:
      - goal_checker

    controller_plugins:
      - FollowPath

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker

      # 소형 Ackermann 차량 기준
      required_movement_radius: 0.05
      movement_time_allowance: 15.0

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true

      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.30

    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController

      # Humble에서 사용하는 목표 선속도
      desired_linear_vel: 0.20

      lookahead_dist: 0.35
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.55
      lookahead_time: 1.5

      rotate_to_heading_angular_vel: 0.8
      transform_tolerance: 0.2

      use_velocity_scaled_lookahead_dist: true

      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.40

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true

      regulated_linear_scaling_min_radius: 0.30
      regulated_linear_scaling_min_speed: 0.05

      cost_scaling_dist: 0.30
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 5.0

      # Ackermann은 제자리 회전할 수 없으므로 false
      use_rotate_to_heading: false

      # Reeds-Shepp 경로와 후진 주행 지원
      allow_reversing: true

      rotate_to_heading_min_angle: 0.785
      max_robot_pose_search_dist: 10.0
      use_interpolation: false


# ============================================================
# Local Costmap
# ============================================================

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 10.0
      publish_frequency: 5.0

      global_frame: odom
      robot_base_frame: base_footprint

      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      transform_tolerance: 0.3

      # 실제 차체와 바퀴를 감싸는 직사각형 footprint
      footprint: >
        [[0.17, 0.12],
         [0.17, -0.12],
         [-0.16, -0.12],
         [-0.16, 0.12]]

      footprint_padding: 0.01
      always_send_full_costmap: true

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /scan
          sensor_frame: lidar_link
          data_type: LaserScan

          clearing: true
          marking: true

          obstacle_min_range: 0.05
          obstacle_max_range: 5.0

          raytrace_min_range: 0.05
          raytrace_max_range: 6.0

          max_obstacle_height: 2.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer

        inflation_radius: 0.30
        cost_scaling_factor: 5.0


# ============================================================
# Global Costmap
# ============================================================

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 2.0
      publish_frequency: 1.0

      global_frame: map
      robot_base_frame: base_footprint

      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.5

      footprint: >
        [[0.17, 0.12],
         [0.17, -0.12],
         [-0.16, -0.12],
         [-0.16, 0.12]]

      footprint_padding: 0.01
      always_send_full_costmap: true

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /scan
          sensor_frame: lidar_link
          data_type: LaserScan

          clearing: true
          marking: true

          obstacle_min_range: 0.05
          obstacle_max_range: 5.0

          raytrace_min_range: 0.05
          raytrace_max_range: 6.0

          max_obstacle_height: 2.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer

        inflation_radius: 0.30
        cost_scaling_factor: 5.0


# ============================================================
# Planner Server
# Smac Hybrid-A* for Ackermann kinematics
# ============================================================

planner_server:
  ros__parameters:
    use_sim_time: true

    expected_planner_frequency: 5.0

    planner_plugins:
      - GridBased

    GridBased:
      plugin: nav2_smac_planner/SmacPlannerHybrid

      tolerance: 0.20
      downsample_costmap: false
      downsampling_factor: 1

      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0

      motion_model_for_search: REEDS_SHEPP
      angle_quantization_bins: 72

      # L / tan(max steering angle)
      # 0.213 / tan(0.70) ≈ 0.253 m
      minimum_turning_radius: 0.253

      reverse_penalty: 2.0
      change_penalty: 0.2
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015

      lookup_table_size: 10.0
      cache_obstacle_heuristic: false

      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 1.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false

      smooth_path: true

      smoother:
        max_iterations: 1000
        w_smooth: 0.30
        w_data: 0.20
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2


# ============================================================
# Smoother Server
# ============================================================

smoother_server:
  ros__parameters:
    use_sim_time: true

    smoother_plugins:
      - simple_smoother

    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother

      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


# ============================================================
# Behavior Server
#
# Ackermann 차량은 Spin을 수행할 수 없으므로 Spin은 제외합니다.
# ============================================================

behavior_server:
  ros__parameters:
    use_sim_time: true

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw

    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0

    global_frame: odom
    robot_base_frame: base_footprint

    transform_tolerance: 0.3
    simulate_ahead_time: 2.0

    max_rotational_vel: 0.8
    min_rotational_vel: 0.1
    rotational_acc_lim: 1.0

    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - wait

    spin:
      plugin: nav2_behaviors/Spin

    backup:
      plugin: nav2_behaviors/BackUp

    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading

    wait:
      plugin: nav2_behaviors/Wait


# ============================================================
# BT Navigator
# ============================================================

bt_navigator:
  ros__parameters:
    use_sim_time: true

    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node

      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_wait_action_bt_node

      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node

      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node

      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      
      - nav2_spin_action_bt_node
      - nav2_spin_cancel_bt_node

      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node

      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node

      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node

      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node

      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node

      - nav2_wait_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node


# ============================================================
# Waypoint Follower
# ============================================================

waypoint_follower:
  ros__parameters:
    use_sim_time: true

    loop_rate: 20
    stop_on_failure: false

    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200


# ============================================================
# Velocity Smoother
#
# /cmd_vel_nav 입력을 받아 /cmd_vel로 내보내도록
# launch 파일에서 remapping할 예정입니다.
# ============================================================

velocity_smoother:
  ros__parameters:
    use_sim_time: true

    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP

    max_velocity:
      - 0.25
      - 0.0
      - 1.0

    min_velocity:
      - -0.15
      - 0.0
      - -1.0

    max_accel:
      - 0.5
      - 0.0
      - 1.5

    max_decel:
      - -0.5
      - 0.0
      - -1.5

    odom_topic: /odom
    odom_duration: 0.1

    deadband_velocity:
      - 0.0
      - 0.0
      - 0.0

    velocity_timeout: 1.0


robot_state_publisher:
  ros__parameters:
    use_sim_time: true
